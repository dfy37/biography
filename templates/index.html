<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家传 | 对话式 Multi-Agent 传记生成器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="container">
      <h1>家传 · 对话式人物传记采写</h1>
      <p class="subtitle">用户与采访助手多轮聊天，素材充分后自动触发“编排代理 + 写作代理”。</p>

      <section class="card">
        <div class="toolbar">
          <button id="startBtn" type="button">开启新对话</button>
          <span id="statusText">未开始</span>
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div class="input-row">
          <textarea id="userInput" rows="3" placeholder="请输入你的回复..." disabled></textarea>
          <button id="sendBtn" type="button" disabled>发送</button>
        </div>
      </section>

      <section id="resultSection" class="result-grid" hidden>
        <article class="card">
          <h2>① 编排代理输出</h2>
          <pre id="structureOutput"></pre>
        </article>
        <article class="card full">
          <h2>② 写作代理输出（传记初稿）</h2>
          <pre id="bioOutput"></pre>
        </article>
      </section>
    </main>

    <script>
      let sessionId = "";
      const startBtn = document.getElementById("startBtn");
      const sendBtn = document.getElementById("sendBtn");
      const userInput = document.getElementById("userInput");
      const chatBox = document.getElementById("chatBox");
      const statusText = document.getElementById("statusText");
      const resultSection = document.getElementById("resultSection");
      const structureOutput = document.getElementById("structureOutput");
      const bioOutput = document.getElementById("bioOutput");

      function appendMessage(role, content) {
        const item = document.createElement("div");
        item.className = `msg ${role}`;
        item.innerText = `${role === "assistant" ? "助手" : "用户"}：${content}`;
        chatBox.appendChild(item);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      async function startChat() {
        const res = await fetch("/chat/start", { method: "POST" });
        const data = await res.json();
        sessionId = data.session_id;
        chatBox.innerHTML = "";
        data.messages.forEach((m) => appendMessage(m.role, m.content));
        sendBtn.disabled = false;
        userInput.disabled = false;
        resultSection.hidden = true;
        statusText.innerText = "采集中";
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || !sessionId) return;

        appendMessage("user", text);
        userInput.value = "";

        const res = await fetch("/chat/message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text }),
        });
        const data = await res.json();

        if (!res.ok) {
          appendMessage("assistant", data.error || "请求失败，请重试。");
          return;
        }

        const assistantMessage = data.messages[data.messages.length - 1];
        appendMessage(assistantMessage.role, assistantMessage.content);

        if (data.ready_to_write && data.result) {
          statusText.innerText = "已完成写作";
          sendBtn.disabled = true;
          userInput.disabled = true;
          structureOutput.innerText = data.result.structure || "";
          bioOutput.innerText = data.result.biography || "";
          resultSection.hidden = false;
        }
      }

      startBtn.addEventListener("click", startChat);
      sendBtn.addEventListener("click", sendMessage);
      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
          sendMessage();
        }
      });
    </script>
  </body>
</html>
