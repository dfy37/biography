<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家传 | 对话式 Multi-Agent 传记生成器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>家传</h1>
          <p>ChatGPT 风格对话采写台</p>
        </div>
        <div class="actions">
          <button id="startBtn" type="button">开启新对话</button>
          <span id="statusText" class="status-badge">未开始</span>
        </div>
      </header>

      <section id="chatBox" class="chat-stage" aria-live="polite"></section>

      <section class="composer-wrap">
        <div class="composer">
          <textarea id="userInput" rows="1" placeholder="给‘家传助手’发送消息（Ctrl/⌘ + Enter 发送）" disabled></textarea>
          <button id="sendBtn" type="button" disabled>发送</button>
        </div>
      </section>

      <section id="resultSection" class="result-grid" hidden>
        <article class="result-card">
          <h2>① 编排代理输出</h2>
          <pre id="structureOutput"></pre>
        </article>
        <article class="result-card full">
          <h2>② 写作代理输出（传记初稿）</h2>
          <pre id="bioOutput"></pre>
        </article>
      </section>
    </main>

    <script>
      let sessionId = "";
      const startBtn = document.getElementById("startBtn");
      const sendBtn = document.getElementById("sendBtn");
      const userInput = document.getElementById("userInput");
      const chatBox = document.getElementById("chatBox");
      const statusText = document.getElementById("statusText");
      const resultSection = document.getElementById("resultSection");
      const structureOutput = document.getElementById("structureOutput");
      const bioOutput = document.getElementById("bioOutput");

      function appendMessage(role, content) {
        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.innerText = content;

        row.appendChild(bubble);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      async function startChat() {
        const res = await fetch("/chat/start", { method: "POST" });
        const data = await res.json();
        sessionId = data.session_id;
        chatBox.innerHTML = "";
        data.messages.forEach((m) => appendMessage(m.role, m.content));
        sendBtn.disabled = false;
        userInput.disabled = false;
        userInput.focus();
        resultSection.hidden = true;
        statusText.innerText = "采集中";
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || !sessionId) return;

        appendMessage("user", text);
        userInput.value = "";
        userInput.style.height = "auto";

        const res = await fetch("/chat/message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text }),
        });
        const data = await res.json();

        if (!res.ok) {
          appendMessage("assistant", data.error || "请求失败，请重试。");
          return;
        }

        const assistantMessage = data.messages[data.messages.length - 1];
        appendMessage(assistantMessage.role, assistantMessage.content);

        if (data.ready_to_write && data.result) {
          statusText.innerText = "已完成写作";
          sendBtn.disabled = true;
          userInput.disabled = true;
          structureOutput.innerText = data.result.structure || "";
          bioOutput.innerText = data.result.biography || "";
          resultSection.hidden = false;
        }
      }

      function autoresize() {
        userInput.style.height = "auto";
        userInput.style.height = `${Math.min(userInput.scrollHeight, 160)}px`;
      }

      startBtn.addEventListener("click", startChat);
      sendBtn.addEventListener("click", sendMessage);
      userInput.addEventListener("input", autoresize);
      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
</html>
