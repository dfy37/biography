<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家传 | 对话式 Multi-Agent 传记生成器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>家传</h1>
          <p>先采访，再由多代理协作生成传记</p>
        </div>
        <div class="actions">
          <button id="startBtn" type="button">开启新对话</button>
          <button id="finishBtn" type="button" disabled>结束采访并生成</button>
          <span id="statusText" class="status-badge">未开始</span>
        </div>
      </header>

      <section class="workspace">
        <section>
          <div id="chatBox" class="chat-stage" aria-live="polite"></div>
          <section class="composer-wrap">
            <div class="composer">
              <textarea id="userInput" rows="1" placeholder="继续采访内容，或输入“开始写传记”" disabled></textarea>
              <button id="sendBtn" type="button" disabled>发送</button>
            </div>
          </section>
        </section>

        <aside class="side-panel">
          <h2>生成过程（Multi-Agent）</h2>
          <div id="logList" class="log-list empty">完成采访后将在这里显示代理过程...</div>
          <article class="result-card">
            <h3>章节结构</h3>
            <pre id="structureOutput"></pre>
          </article>
          <article class="result-card">
            <h3>传记初稿</h3>
            <pre id="bioOutput"></pre>
          </article>
        </aside>
      </section>
    </main>

    <script>
      let sessionId = "";
      let renderedCount = 0;
      const startBtn = document.getElementById("startBtn");
      const finishBtn = document.getElementById("finishBtn");
      const sendBtn = document.getElementById("sendBtn");
      const userInput = document.getElementById("userInput");
      const chatBox = document.getElementById("chatBox");
      const statusText = document.getElementById("statusText");
      const logList = document.getElementById("logList");
      const structureOutput = document.getElementById("structureOutput");
      const bioOutput = document.getElementById("bioOutput");

      function appendMessage(role, content) {
        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.innerText = content;

        row.appendChild(bubble);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
        renderedCount += 1;
      }

      function appendNewMessages(messages) {
        const start = Math.min(renderedCount, messages.length);
        messages.slice(start).forEach((m) => appendMessage(m.role, m.content));
      }

      function renderLogs(logs) {
        if (!logs || !logs.length) {
          logList.className = "log-list empty";
          logList.innerText = "完成采访后将在这里显示代理过程...";
          return;
        }

        logList.className = "log-list";
        logList.innerHTML = "";
        logs.forEach((item, idx) => {
          const line = document.createElement("div");
          line.className = `log-item ${item.status || "done"}`;
          line.innerHTML = `<strong>${idx + 1}. ${item.agent}</strong><p>${item.output || ""}</p>`;
          logList.appendChild(line);
        });
      }

      function setGeneratedState(data) {
        statusText.innerText = "已完成写作";
        sendBtn.disabled = true;
        finishBtn.disabled = true;
        userInput.disabled = true;
        renderLogs(data.logs || []);
        structureOutput.innerText = (data.result && data.result.structure) || "";
        bioOutput.innerText = (data.result && data.result.biography) || "";
      }

      async function startChat() {
        const res = await fetch("/chat/start", { method: "POST" });
        const data = await res.json();
        sessionId = data.session_id;
        chatBox.innerHTML = "";
        renderedCount = 0;
        data.messages.forEach((m) => appendMessage(m.role, m.content));
        sendBtn.disabled = false;
        finishBtn.disabled = false;
        userInput.disabled = false;
        userInput.focus();
        structureOutput.innerText = "";
        bioOutput.innerText = "";
        renderLogs([]);
        statusText.innerText = "采访中";
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || !sessionId) return;

        appendMessage("user", text);
        userInput.value = "";
        userInput.style.height = "auto";

        const res = await fetch("/chat/message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text }),
        });
        const data = await res.json();

        if (!res.ok) {
          appendMessage("assistant", data.error || "请求失败，请重试。");
          return;
        }

        appendNewMessages(data.messages || []);

        if (data.ready_to_write && data.result) {
          setGeneratedState(data);
        }
      }

      async function finishInterview() {
        if (!sessionId) return;
        statusText.innerText = "生成中";

        const res = await fetch("/chat/finish", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId }),
        });
        const data = await res.json();

        if (!res.ok) {
          statusText.innerText = "采访中";
          appendMessage("assistant", data.error || "结束采访失败，请重试。");
          return;
        }

        appendNewMessages(data.messages || []);
        setGeneratedState(data);
      }

      function autoresize() {
        userInput.style.height = "auto";
        userInput.style.height = `${Math.min(userInput.scrollHeight, 160)}px`;
      }

      startBtn.addEventListener("click", startChat);
      finishBtn.addEventListener("click", finishInterview);
      sendBtn.addEventListener("click", sendMessage);
      userInput.addEventListener("input", autoresize);
      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
</html>
